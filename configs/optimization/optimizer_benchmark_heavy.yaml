# Heavy benchmark for optimizer testing
# 10 filters in deliberately suboptimal order (expensive first, cheap last)
# This should show significant speedup from filter fusion

project_name: 'optimizer-benchmark-heavy'
np: 4
use_cache: false

process:
  # EXPENSIVE filters first (suboptimal - optimizer should help)

  # 1. Word repetition - ngram analysis (expensive)
  - word_repetition_filter:
      rep_len: 5
      min_ratio: 0.0
      max_ratio: 0.5

  # 2. Character repetition - regex ops (medium)
  - character_repetition_filter:
      rep_len: 10
      min_ratio: 0.0
      max_ratio: 0.5

  # 3. Stopwords filter - vocabulary lookup (medium)
  - stopwords_filter:
      lang: en
      min_ratio: 0.1
      max_ratio: 0.8

  # 4. Flagged words filter - vocabulary lookup (medium)
  - flagged_words_filter:
      lang: en
      max_ratio: 0.01

  # 5. Special characters - character analysis (medium)
  - special_characters_filter:
      min_ratio: 0.0
      max_ratio: 0.5

  # 6. Average line length - line analysis (medium)
  - average_line_length_filter:
      min_len: 10
      max_len: 1000

  # 7. Maximum line length - line analysis (medium)
  - maximum_line_length_filter:
      min_len: 10
      max_len: 5000

  # CHEAP filters last (should be first for optimal execution)

  # 8. Text length - very cheap
  - text_length_filter:
      min_len: 50
      max_len: 10000

  # 9. Words num - cheap
  - words_num_filter:
      min_num: 5
      max_num: 2000

  # 10. Alphanumeric - cheap
  - alphanumeric_filter:
      min_ratio: 0.25
      max_ratio: 1.0
