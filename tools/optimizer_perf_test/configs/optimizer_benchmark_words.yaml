# Benchmark config for filter_fusion with INTER_WORDS filters
# These filters all share word tokenization - fusion should help!
#
# Filters in INTER_WORDS registry:
# - word_repetition_filter
# - words_num_filter
# - stopwords_filter
# - flagged_words_filter
# (perplexity_filter requires model, skipping for simplicity)

project_name: 'optimizer-benchmark-words'
np: 4
use_cache: false

process:
  # All these filters tokenize text into words
  # Fusion will tokenize ONCE and share across all filters

  - word_repetition_filter:
      rep_len: 10
      min_ratio: 0.0
      max_ratio: 0.5

  - words_num_filter:
      min_num: 5
      max_num: 1000

  - stopwords_filter:
      lang: en
      min_ratio: 0.0
      max_ratio: 0.8

  - flagged_words_filter:
      lang: en
      max_ratio: 0.01
