# Benchmark config for COMBINED optimization strategies
#
# This config tests all three strategies together:
# 1. op_reorder: Expensive filters (stopwords, flagged_words) before cheap filters
# 2. filter_fusion: Multiple filters share INTER_WORDS tokenization
# 3. mapper_fusion: Consecutive text cleaning mappers
#
# Expected benefits:
# - op_reorder: Cheap filters reduce data before expensive filters
# - filter_fusion: Tokenize once, share across filters (default executor only)
# - mapper_fusion: Single pass through data for mappers (default executor only)

project_name: 'optimizer-benchmark-combined'
np: 12
use_cache: false

process:
  # === MAPPERS (can be fused) ===
  - clean_html_mapper: {}
  - clean_links_mapper: {}
  - clean_email_mapper: {}
  - clean_copyright_mapper: {}
  - punctuation_normalization_mapper: {}
  - whitespace_normalization_mapper: {}

  # === FILTERS IN BAD ORDER (op_reorder will fix) ===
  # Expensive filters first (BAD - should run last)
  - stopwords_filter:
      lang: en
      min_ratio: 0.05
      max_ratio: 0.95

  - flagged_words_filter:
      lang: en
      max_ratio: 0.01

  # Cheap filters last (BAD - should run first)
  - text_length_filter:
      min_len: 500
      max_len: 50000

  - words_num_filter:
      min_num: 50
      max_num: 10000

  - alphanumeric_filter:
      min_ratio: 0.70
      max_ratio: 1.0

  - special_characters_filter:
      min_ratio: 0.0
      max_ratio: 0.25
