# Probe Benchmark Config
#
# Demonstrates the effectiveness of probing-aided reordering.
# Static heuristics classify all these filters as "cheap" (same cost),
# so static reorder makes NO changes. But actual runtimes vary significantly:
#   - text_length_filter:           ~3.6s  (very fast)
#   - special_characters_filter:    ~5.2s
#   - alphanumeric_filter:          ~8.8s
#   - words_num_filter:            ~12.4s
#   - character_repetition_filter: ~21.6s  (slow due to regex)
#
# Benchmark Results (C4 dataset, 356K samples):
#   - Baseline (no optimization):    73.5s
#   - Static reorder (heuristics):   73.3s  (no change)
#   - Probed reorder (measured):     53.1s  (28% faster)
#
# Probing overhead: ~0.15s for 100 samples
# Net savings: ~20 seconds on this workload
#
# Usage:
#   python tools/optimizer_benchmark/run_benchmark.py \
#       --recipe-path tools/optimizer_benchmark/configs/probe_benchmark.yaml \
#       --dataset-path <your_dataset.jsonl> \
#       --strategies op_reorder
#
#   Note: Enable probing in the recipe by adding:
#     optimizer_probe_enabled: true
#     optimizer_probe_samples: 100

project_name: 'probe-benchmark'
export_path: 'outputs/probe_benchmark/result.jsonl'
np: 12
use_cache: false

process:
  # ============================================================
  # Suboptimal order: Filters that keep most data come first
  # Optimal: Filters that reject more data should come first
  # ============================================================

  # This filter keeps ~95% of data (low rejection rate)
  - words_num_filter:
      min_num: 3
      max_num: 10000
      auto_op_parallelism: false

  # This filter keeps ~90% of data
  - alphanumeric_filter:
      min_ratio: 0.1
      max_ratio: 1.0
      auto_op_parallelism: false

  # This filter keeps ~80% of data
  - character_repetition_filter:
      rep_len: 5
      max_ratio: 0.8
      auto_op_parallelism: false

  # This filter keeps ~70% of data
  - average_line_length_filter:
      min_len: 5
      max_len: 500
      auto_op_parallelism: false

  # This filter rejects more data - should be FIRST!
  # Static heuristics don't know this, but probing will discover it
  - text_length_filter:
      min_len: 100
      max_len: 5000
      auto_op_parallelism: false

  # This filter may reject significant data
  - special_characters_filter:
      min_ratio: 0.0
      max_ratio: 0.3
      auto_op_parallelism: false

  # This also rejects data - probing will find the optimal order
  - word_repetition_filter:
      rep_len: 3
      max_ratio: 0.5
      auto_op_parallelism: false
