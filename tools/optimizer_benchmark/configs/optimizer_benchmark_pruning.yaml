# Benchmark config for op_pruning optimization strategy
#
# This config contains intentionally redundant/no-op operations to showcase
# the op_pruning strategy's ability to detect and remove them.
#
# Redundant operations included:
# 1. No-op filters: filters with pass-through conditions (min=0, max=inf)
# 2. Duplicate operations: same operation repeated consecutively
# 3. Useless filters: filters that accept everything
#
# Expected: op_pruning removes ~6 operations, keeping only the useful ones

project_name: 'optimizer-benchmark-pruning'
np: 12
use_cache: false

process:
  # === USEFUL MAPPERS ===
  - clean_html_mapper: {}
  - clean_links_mapper: {}
  - whitespace_normalization_mapper: {}

  # === NO-OP FILTER #1: text_length with no constraints ===
  # min_len=0 and max_len=very high means passes everything
  - text_length_filter:
      min_len: 0
      max_len: 999999999

  # === USEFUL FILTER: actual text length constraint ===
  - text_length_filter:
      min_len: 100
      max_len: 50000

  # === NO-OP FILTER #2: words_num with no constraints ===
  - words_num_filter:
      min_num: 0
      max_num: 999999999

  # === USEFUL FILTER: actual word count constraint ===
  - words_num_filter:
      min_num: 20
      max_num: 5000

  # === NO-OP FILTER #3: alphanumeric with full range ===
  - alphanumeric_filter:
      min_ratio: 0.0
      max_ratio: 1.0

  # === USEFUL FILTER: actual alphanumeric constraint ===
  - alphanumeric_filter:
      min_ratio: 0.6
      max_ratio: 1.0

  # === NO-OP FILTER #4: special_characters with full range ===
  - special_characters_filter:
      min_ratio: 0.0
      max_ratio: 1.0

  # === USEFUL FILTER: actual special characters constraint ===
  - special_characters_filter:
      min_ratio: 0.0
      max_ratio: 0.3

  # === DUPLICATE FILTER: same as previous (should be pruned) ===
  - special_characters_filter:
      min_ratio: 0.0
      max_ratio: 0.3

  # === NO-OP FILTER #5: character_repetition allowing everything ===
  - character_repetition_filter:
      rep_len: 10
      max_ratio: 1.0

  # === USEFUL FILTER: actual repetition constraint ===
  - character_repetition_filter:
      rep_len: 10
      max_ratio: 0.5

# Expected after pruning:
# - 3 mappers (kept)
# - 5 useful filters (kept)
# - 6 no-op/duplicate filters (pruned)
#
# Total: 14 ops -> 8 ops (6 pruned, ~43% reduction)
